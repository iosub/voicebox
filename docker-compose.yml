services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      # Bind to localhost only for security
      - "127.0.0.1:17493:17493"

    volumes:
      # Bind-mount for generated audio (customize the host path as needed)
      # Host side:      ./output/
      # Container side: /app/data/generations/
      - ./output:/app/data/generations

      # Named volume for profiles, DB, cache (persists across container restarts)
      - voicebox-data:/app/data

    runtime: nvidia

    environment:
      - LOG_LEVEL=info
      - VOICEBOX_MODELS_DIR=/app/data/models
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    networks:
      - voicebox-net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
